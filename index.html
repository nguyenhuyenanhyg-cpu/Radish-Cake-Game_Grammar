<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字味廚房 - 蘿蔔糕打工任務</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

        :root {
            /* 顏色系統 (Pastel Theme) */
            --primary: #FF8F9C;     
            --primary-dark: #E07884;
            --secondary: #6CB4EE;   
            --secondary-dark: #5A99C9;
            --correct: #8ED081;     
            --correct-dark: #76AE6B;
            --wrong: #FF6B6B;       
            --bg-color: #FFF9F0;    
            --kitchen-bg: #FFF8DC; /* 柔和木頭/奶油色 */
            --kitchen-border: #F5DEB3;
            --chat-bg: #abc1d1;    /* LINE 經典藍底 */
            --text-main: #4A4A4A;
        }

        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft JhengHei', sans-serif; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFE4E1 15%, transparent 16%), radial-gradient(#FFE4E1 15%, transparent 16%);
            background-size: 40px 40px; background-position: 0 0, 20px 20px;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- 總容器 (Split-View) --- */
        .app-container { 
            width: 95%; max-width: 1200px; height: 90vh; 
            display: flex; flex-direction: row; gap: 20px; 
        }

        /* --- 共同面板樣式 --- */
        .panel {
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* =========================================
           左側：虛擬廚房 (65%)
           ========================================= */
        .left-panel { 
            flex: 6.5; background-color: var(--kitchen-bg); 
            border: 4px solid var(--kitchen-border); position: relative; 
        }
        
        .kitchen-header {
            background: rgba(255,255,255,0.6); padding: 10px 20px; font-weight: 800;
            color: #8B6508; border-bottom: 3px solid var(--kitchen-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .kitchen-workspace { flex: 1; position: relative; padding: 20px; }

        /* 廚房物件樣式 */
        .kitchen-item { 
            font-size: 50px; cursor: pointer; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
        }
        .kitchen-item:hover { transform: scale(1.1); }
        .kitchen-item:active { transform: scale(0.9); }
        
        .item-label { 
            font-size: 14px; background: white; padding: 4px 8px; border-radius: 8px; 
            margin-top: -5px; font-weight: 800; border: 2px solid #E9ECEF;
            box-shadow: 0 4px 0 #E9ECEF; color: var(--text-main);
        }

        /* 基礎設施位置 */
        #sink { font-size: 80px; bottom: 20px; left: 20px; pointer-events: none; }
        #pot { font-size: 100px; bottom: 20px; right: 40px; display: none; pointer-events: none; }

        /* G1 任務物件 */
        #radish-dirty { top: 40px; left: 40px; filter: grayscale(80%) sepia(50%); animation: float 2s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* G3 任務食材 (初始隱藏) */
        .ingredient { display: none; top: 60px; }
        #ing-radish { left: 10%; }
        #ing-flour { left: 28%; }
        #ing-mushroom { left: 46%; }
        #ing-shrimp { left: 64%; }
        #ing-pork { left: 82%; } /* 干擾項 */

        /* 飛入鍋中的動畫狀態 */
        .in-pot { top: 75% !important; left: 80% !important; transform: scale(0.3) !important; opacity: 0; pointer-events: none; }

        /* 完成的蘿蔔糕 */
        #turnip-cake { font-size: 120px; top: 30%; left: 40%; display: none; pointer-events: none; }
        .cake-pop { animation: popBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popBounce { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* =========================================
           右側：LINE 聊天室 (35%)
           ========================================= */
        .right-panel { 
            flex: 3.5; background-color: var(--chat-bg); 
            border: 4px solid #9ab5c7; 
        }

        .chat-header {
            background-color: #2c3e50; color: white; padding: 15px; font-weight: 800;
            display: flex; align-items: center; gap: 10px; font-size: 1.1em;
        }

        #chat-history { 
            flex: 1; padding: 15px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 12px; 
            scroll-behavior: smooth;
        }

        /* 聊天氣泡 */
        .message { 
            max-width: 85%; padding: 12px 16px; border-radius: 18px; 
            font-size: 15px; line-height: 1.5; font-weight: 700;
            animation: fadeIn 0.4s ease; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .msg-boss { background-color: white; color: #333; align-self: flex-start; border-top-left-radius: 4px; }
        .msg-player { background-color: #85e085; color: #111; align-self: flex-end; border-top-right-radius: 4px; }
        .msg-system { 
            background-color: rgba(0,0,0,0.2); color: white; align-self: center; 
            font-size: 12px; border-radius: 20px; padding: 6px 12px; box-shadow: none; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 選擇題面板 (使用 3D 按鈕) */
        #interaction-panel { 
            background-color: white; padding: 15px; display: none; 
            flex-direction: column; gap: 10px; border-top: 2px solid #E9ECEF; 
        }
        .choice-btn {
            background-color: white; border: 3px solid #E9ECEF; padding: 12px 15px;
            font-size: 1.05em; font-weight: 800; border-radius: 16px; cursor: pointer; 
            color: var(--text-main); transition: all 0.1s; box-shadow: 0 5px 0 #E9ECEF; text-align: left;
        }
        .choice-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #E9ECEF; }
        .choice-btn:hover { border-color: var(--secondary); }

        /* --- 響應式設計 (手機版) --- */
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; padding: 10px; }
            .app-container { flex-direction: column; height: auto; min-height: 100vh; gap: 15px; }
            .left-panel { min-height: 45vh; border-width: 3px; }
            .right-panel { min-height: 55vh; border-width: 3px; }
            .kitchen-item { font-size: 40px; }
            #sink { font-size: 60px; bottom: 10px; }
            #pot { font-size: 80px; bottom: 10px; }
        }

        /* 震動錯誤動畫 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        .shake-err { animation: shake 0.4s; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-panel">
        <div class="kitchen-header">
            <span>👨‍🍳 打工任務：製作蘿蔔糕</span>
            <span id="kitchen-status">進度：備料中...</span>
        </div>
        <div class="kitchen-workspace">
            <div id="sink" class="kitchen-item">💧<div class="item-label">洗碗槽</div></div>
            <div id="pot" class="kitchen-item">🥘<div class="item-label">大鍋子</div></div>

            <div id="radish-dirty" class="kitchen-item" onclick="washRadish()">🥕🥕<div class="item-label">未洗的蘿蔔</div></div>

            <div id="ing-radish" class="kitchen-item ingredient" onclick="putInPot('ing-radish', true)">🥕<div class="item-label">白蘿蔔</div></div>
            <div id="ing-flour" class="kitchen-item ingredient" onclick="putInPot('ing-flour', true)">🍚<div class="item-label">在來米粉</div></div>
            <div id="ing-mushroom" class="kitchen-item ingredient" onclick="putInPot('ing-mushroom', true)">🍄<div class="item-label">乾香菇</div></div>
            <div id="ing-shrimp" class="kitchen-item ingredient" onclick="putInPot('ing-shrimp', true)">🦐<div class="item-label">蝦米</div></div>
            <div id="ing-pork" class="kitchen-item ingredient" onclick="putInPot('ing-pork', false)">🥩<div class="item-label">豬絞肉</div></div>

            <div id="turnip-cake" class="kitchen-item">🥮<div class="item-label">蘿蔔糕</div></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="chat-header">
            <span>👤</span> 店長 (老闆)
        </div>
        <div id="chat-history">
            </div>
        <div id="interaction-panel">
            </div>
    </div>
</div>

<script>
    // --- 音效系統 (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSFX(isCorrect) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (isCorrect) {
            // Ting! (Đúng)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); 
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            // Bụp! (Sai)
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // --- 遊戲狀態管理 ---
    let currentStage = 1;
    let potIngredientsCount = 0;

    const chatHistory = document.getElementById('chat-history');
    const interactionPanel = document.getElementById('interaction-panel');
    const kitchenStatus = document.getElementById('kitchen-status');

    // 初始化
    window.onload = () => {
        addSystemMessage("📅 除夕前一天 - 台灣小吃店");
        setTimeout(() => {
            addBossMessage("早安！今天除夕，客人會很多。我們廚房裡還有<b>好多白蘿蔔</b>沒洗，你先點擊畫面左邊把它們洗乾淨！<br><span style='font-size:0.85em; color:gray;'>(語法：好+多+量詞)</span>");
        }, 1000);
    };

    // --- UI 控制函數 ---
    function addBossMessage(text) {
        const msg = document.createElement('div');
        msg.className = 'message msg-boss';
        msg.innerHTML = text;
        chatHistory.appendChild(msg);
        scrollToBottom();
    }

    function addPlayerMessage(text) {
        const msg = document.createElement('div');
        msg.className = 'message msg-player';
        msg.innerText = text;
        chatHistory.appendChild(msg);
        scrollToBottom();
    }

    function addSystemMessage(text) {
        const msg = document.createElement('div');
        msg.className = 'message msg-system';
        msg.innerText = text;
        chatHistory.appendChild(msg);
        scrollToBottom();
    }

    function scrollToBottom() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function showChoices(choices) {
        interactionPanel.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => {
                interactionPanel.style.display = 'none';
                addPlayerMessage(choice.text);
                setTimeout(choice.action, 500);
            };
            interactionPanel.appendChild(btn);
        });
        interactionPanel.style.display = 'flex';
        scrollToBottom();
    }

    // --- 關卡 1：[G1 好+多+量詞] 洗蘿蔔 ---
    function washRadish() {
        if (currentStage !== 1) return;
        
        playSFX(true);
        const dirtyRadish = document.getElementById('radish-dirty');
        dirtyRadish.style.filter = "none"; 
        dirtyRadish.style.animation = "none";
        dirtyRadish.innerHTML = "✨🥕✨<div class='item-label'>乾淨的蘿蔔</div>";
        
        setTimeout(() => {
            addSystemMessage("✅ 動作完成：洗蘿蔔");
            addBossMessage("太好了！<b>好多白蘿蔔</b>都洗乾淨了。");
            dirtyRadish.style.opacity = "0";
            document.getElementById('sink').style.opacity = "0";
            startStage2();
        }, 1500);
    }

    // --- 關卡 2：[G3 是...的] 混合食材 ---
    function startStage2() {
        currentStage = 2;
        kitchenStatus.innerText = "進度：混合食材中...";
        setTimeout(() => {
            document.getElementById('pot').style.display = "flex";
            const ingredients = document.querySelectorAll('.ingredient');
            ingredients.forEach(el => el.style.display = "flex");

            addBossMessage("接下來準備做蘿蔔糕。你知道蘿蔔糕<b>是</b>用什麼做<b>的</b>嗎？請把正確的 4 種食材點擊放進鍋子裡。<br><span style='font-size:0.85em; color:gray;'>(語法：是...的)</span>");
        }, 1500);
    }

    function putInPot(id, isCorrect) {
        if (currentStage !== 2) return;
        
        const item = document.getElementById(id);
        
        if (!isCorrect) {
            playSFX(false);
            item.classList.add('shake-err');
            addSystemMessage("❌ 豬絞肉不是蘿蔔糕的材料喔！");
            setTimeout(() => item.classList.remove('shake-err'), 400);
            return;
        }

        playSFX(true);
        item.classList.add('in-pot');
        potIngredientsCount++;

        if (potIngredientsCount === 4) {
            currentStage = 3;
            setTimeout(() => {
                addSystemMessage("✅ 動作完成：食材入鍋");
                addBossMessage("沒錯！蘿蔔糕<b>是</b>用白蘿蔔、在來米粉、乾香菇和蝦米做<b>的</b>！現在我們開始蒸吧。");
                startStage3();
            }, 1000);
        }
    }

    // --- 關卡 3：[G2 V+起來] 評價氣味 ---
    function startStage3() {
        kitchenStatus.innerText = "進度：烹調完成";
        setTimeout(() => {
            document.getElementById('pot').style.display = "none";
            const cake = document.getElementById('turnip-cake');
            cake.style.display = "flex";
            cake.classList.add('cake-pop');

            addBossMessage("蘿蔔糕蒸好也煎好了！你看，表面黃黃的，聞(　　)怎麼樣？<br><span style='font-size:0.85em; color:gray;'>(語法：V + 起來)</span>");
            
            startStage3Choices();
        }, 2000);
    }

    function startStage3Choices() {
        showChoices([
            { text: "這蘿蔔糕聞下去很香。", action: () => wrongAnswerG2("聞下去") },
            { text: "這蘿蔔糕聞出來很香。", action: () => wrongAnswerG2("聞出來") },
            { text: "這蘿蔔糕聞起來很香。", action: correctG2 }
        ]);
    }

    function wrongAnswerG2(word) {
        playSFX(false);
        addBossMessage(`不是「${word}」喔，我們是在表達對這道菜的評價和感覺，再試一次！`);
        setTimeout(startStage3Choices, 1000);
    }

    function correctG2() {
        playSFX(true);
        addSystemMessage("✅ 語法正確：V + 起來");
        addBossMessage("答對了！聞<b>起來</b>很香，代表你的判斷很準確。");
        startStage4();
    }

    // --- 關卡 4：[G4 V+到] 試吃體驗 ---
    function startStage4() {
        currentStage = 4;
        kitchenStatus.innerText = "進度：大功告成！";
        setTimeout(() => {
            addBossMessage("辛苦了，請你吃一塊剛煎好的蘿蔔糕！味道怎麼樣？<br><span style='font-size:0.85em; color:gray;'>(語法：V + 到)</span>");
            startStage4Choices();
        }, 1500);
    }

    function startStage4Choices() {
        showChoices([
            { text: "這是我第一次吃見這種特別的食物。", action: () => wrongAnswerG4("吃見") },
            { text: "這是我第一次吃到這種特別的食物。", action: correctG4 }
        ]);
    }

    function wrongAnswerG4(word) {
        playSFX(false);
        addBossMessage(`「${word}」不太對喔！「吃」通常搭配「到」來表示動作成功達成。再試一次！`);
        setTimeout(startStage4Choices, 1000);
    }

    function correctG4() {
        playSFX(true);
        addSystemMessage("✅ 語法正確：V + 到");
        addBossMessage("答對了！過年能吃<b>到</b>蘿蔔糕，代表新的一年會有好彩頭喔！恭喜你完成今天的廚房任務！🎉");
        
        // 最終慶祝動畫
        const cake = document.getElementById('turnip-cake');
        cake.style.transform = "scale(1.3)";
        cake.style.filter = "drop-shadow(0 0 20px #FFD700)";
    }

</script>
</body>
</html>
