<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan Part-time Job Simulator</title>
    <style>
        /* --- GLOBAL CSS --- */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; height: 100vh; overflow: hidden; display: flex; flex-direction: column;}
        .hidden { display: none !important; }
        
        /* Heartbeat Animation for Choices */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* --- MENU & STAGE SELECT --- */
        #menu-screen, #stage-select-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fffcf5; background-image: radial-gradient(#ff9800 1px, transparent 1px); background-size: 20px 20px; }
        .title-box { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #ff9800; }
        .title-box h1 { color: #e65100; font-size: 40px; margin: 0 0 10px 0; }
        .title-box p { color: #666; font-size: 18px; margin-bottom: 30px; }
        .btn-large { background: #ff9800; color: white; border: none; padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); }
        .btn-large:hover { background: #e65100; transform: translateY(-3px); }
        
        .stage-grid { display: flex; gap: 20px; margin-top: 30px; }
        .stage-card { background: white; padding: 30px; border-radius: 15px; text-align: center; border: 3px solid #ccc; cursor: pointer; transition: 0.3s; width: 150px; }
        .stage-card.unlocked { border-color: #85e04b; box-shadow: 0 5px 15px rgba(133, 224, 75, 0.3); }
        .stage-card.unlocked:hover { transform: translateY(-5px); background: #f0fdf0; }
        .stage-card.locked { opacity: 0.6; cursor: not-allowed; }
        .stage-card h3 { margin: 10px 0 0 0; color: #333; }

        /* --- GAME UI --- */
        #game-screen { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; background: #333; color: white; padding: 10px 20px; font-size: 18px; font-weight: bold; z-index: 10; height: 40px;}
        .btn-small { cursor: pointer; background: #ff9800; border: none; padding: 5px 15px; border-radius: 5px; color: white; font-weight: bold; margin-left: 10px;}
        .btn-small:hover { background: #e65100; }
        
        #main-content { display: flex; flex: 1; height: calc(100vh - 60px); overflow: hidden; }
        
        /* Left Column: Chat Container */
        #chat-container { width: 40%; background: #749cbd; display: flex; flex-direction: column; border-right: 2px solid #ccc; position: relative; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .boss-msg { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .player-msg { align-self: flex-end; background: #85e04b; border-top-right-radius: 0; }
        .note { font-size: 14px; color: #666; font-style: italic; margin-top: 5px; display: block; }
        .speaker-name { font-weight: bold; display: block; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        
        /* Choices Area (Moved to the bottom of the Chat Column) */
        .choices-area { background: #ebf0f5; padding: 15px; border-top: 2px solid #ccc; display: flex; flex-direction: column; gap: 10px; max-height: 40%; overflow-y: auto;}
        .choice-btn { padding: 12px; cursor: pointer; border: 2px solid #749cbd; border-radius: 8px; background: white; font-size: 15px; text-align: left; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: heartbeat 2s infinite ease-in-out;}
        .choice-btn:hover { background: #e8f4f8; border-color: #ff9800; animation: none; transform: translateX(5px);}

        /* Right Column: Interactive Environment */
        #game-container { width: 60%; background: #fffcf5; padding: 30px; display: flex; flex-direction: column; overflow: hidden; align-items: center;}
        #scene-title { color: #333; font-size: 24px; border-bottom: 3px solid #ff9800; padding-bottom: 10px; margin-top: 0; width: 100%; text-align: center;}
        #interactive-area { display: flex; gap: 40px; justify-content: center; align-items: center; width: 100%; flex: 1; }
        .env-item { font-size: 100px; padding: 20px; background: rgba(255,255,255,0.7); border: 3px dashed #ccc; border-radius: 20px;}

        /* --- MEMO MODAL --- */
        #memo-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .memo-content { background: white; padding: 30px; border-radius: 15px; width: 60%; max-height: 80vh; overflow-y: auto; text-align: center;}
        .memo-content h2 { color: #ff9800; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="title-box">
            <h1>🍜 台灣打工記</h1>
            <p>Taiwan Part-time Job Simulator - TOCFL A1-A2</p>
            <button class="btn-large" onclick="showStageSelect()">Start Game</button>
        </div>
    </div>

    <div id="stage-select-screen" class="hidden">
        <h2>Select a Stage</h2>
        <div class="stage-grid">
            <div class="stage-card unlocked" onclick="startGame(1)">
                <div style="font-size: 40px;">🥢</div>
                <h3>1. 蘿蔔糕<br>(Radish Cake)</h3>
            </div>
            <div class="stage-card unlocked" onclick="startGame(2)">
                <div style="font-size: 40px;">🥞</div>
                <h3>2. 年糕<br>(Nian Gao)</h3>
            </div>
            <div class="stage-card unlocked" onclick="startGame(3)">
                <div style="font-size: 40px;">🐟</div>
                <h3>3. 蒸魚<br>(Steamed Fish)</h3>
            </div>
            <div class="stage-card locked">
                <div style="font-size: 40px;">🍲</div>
                <h3>4. Locked</h3>
            </div>
        </div>
        <button class="btn-small" style="margin-top: 30px; padding: 10px 30px; font-size: 18px;" onclick="location.reload()">Back</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="top-bar">
            <span id="progress-text">Stage: 1 - Task: 1/4</span>
            <span id="score-text">Trust Level: 0</span>
            <div>
                <button id="mute-btn" class="btn-small" onclick="toggleMute()">🔊 Audio: ON</button>
                <button class="btn-small" onclick="backToMenu()">Quit</button>
            </div>
        </div>
        <div id="main-content">
            <div id="chat-container">
                <div id="chat-history"></div>
                <div class="choices-area" id="choices-container"></div>
            </div>
            <div id="game-container">
                <h2 id="scene-title">Task Title</h2>
                <div id="interactive-area"></div>
            </div>
        </div>
    </div>

    <div id="memo-modal">
        <div class="memo-content">
            <h2>📝 Employee Training Summary</h2>
            <p>Congratulations! You have completed the shift successfully.</p>
            <button class="btn-small" style="padding: 10px 30px; font-size: 18px; margin-top: 20px;" onclick="backToMenu()">Back to Home</button>
        </div>
    </div>

    <script>
        /* ==================================================================
           DATABASE (JSON): ALL TEXTS AND LOGIC
           ================================================================== */
        const GAME_DATA = {

                        textVi: "Nhìn trong chảo xem, lớp vỏ NHÌN thế nào rồi?",
                        interactHtml: `<div class="env-item">🍳</div>`,

                        speakerIcon: "👨‍🍳 老闆",
                        textZh: "聽說你沒做過蒸魚，你知道順序嗎？打算怎麼做？",
                        textVi: "Nghe nói cậu chưa làm món cá hấp bao giờ, cậu biết thứ tự làm không? Định làm thế nào?",
                        interactHtml: `<div class="env-item">🐟 🧂 蔥薑</div>`,
                        choices: [
                            { textZh: "我打算先加醬油，然後洗魚，放蔥和薑。", textVi: "Tôi định cho nước tương vào trước, sau đó rửa cá, cho hành và gừng.", replyZh: "順序有點怪怪的喔！如果一開始就加醬油，後來洗魚的時候醬油不就被洗掉了嗎？你再想一下「先」做什麼，「再」做什麼？", isCorrect: false },
                            { textZh: "我打算加醬油先，洗乾淨再。", textVi: "Tôi định cho nước tương trước, rửa sạch rồi mới.", replyZh: "哈哈，中文的順序是「先」加醬油，「再」洗乾淨。不過你的步驟顛倒了，你再重新思考一下煮菜的順序？", isCorrect: false },
                            { textZh: "我打算先加醬油，再把魚洗乾淨，然後放蔥和薑，對嗎？", textVi: "Tôi định cho nước tương vào trước, rồi mới rửa sạch cá, sau đó cho hành và gừng, đúng không?", replyZh: "哎呀，不對啦！你要「先」把魚洗乾淨，放蔥和薑，「再」加一點醬油。最後蒸十分鐘才對喔。", isCorrect: true, playerAutoReplyZh: "啊！原來是這樣。謝謝老闆，我明白了！" }
                        ]
                    },
                    {   // Task 4: V V 看
                        taskName: "分享成果 (Share Result)",
                        preMessage: {
                            speakerIcon: "👩‍💼 我",
                            textZh: "老闆，我照您教的方法做好了！我拍了一張照片傳給您，您看看。（傳送照片）<br><img src='zhengyu.jpg' alt='Steamed Fish' style='width: 100%; border-radius: 10px; margin-top: 10px; border: 2px solid #ccc;'>",
                            textVi: "Ông chủ, tôi làm xong theo cách ông dạy rồi! Tôi chụp một bức ảnh gửi cho ông, ông xem thử nhé. [Gửi ảnh]"
                        },
                        speakerIcon: "👨‍🍳 老闆",
                        textZh: "哇，看起來很好吃！對了，你知道為什麼台灣人過年一定要吃全魚，而且不能全部吃完嗎？",
                        textVi: "Wow, nhìn ngon quá! À đúng rồi, cậu có biết tại sao người Đài Loan đón Tết nhất định phải ăn cá nguyên con, mà lại không được ăn hết sạch không?",
                        interactHtml: `<div class="env-item">📱 💬</div>`,
                        choices: [
                            { textZh: "因為魚很好吃，所以要慢慢吃吃？", textVi: "Vì cá rất ngon, nên phải ăn từ từ?", replyZh: "哈哈，你是想說「慢慢吃」對吧？雖然魚很好吃，但其實有別的意思喔。你再猜猜看有什麼特別的意義？", isCorrect: false },
                            { textZh: "因為我要把剩下的留給貓咪吃吃看？", textVi: "Vì tôi phải chừa lại phần dư cho mèo ăn thử xem sao?", replyZh: "哈哈，你想給貓咪「吃吃看」嗎？貓咪一定會很開心！不過，過年留一點魚是有特別的文化意義的喔。你再想一下「魚」的發音？", isCorrect: false },
                            { textZh: "是因為「魚」和「餘」的發音一樣，代表「年年有餘」對嗎？下次開店，我再做給您吃吃看！", textVi: "Là vì 'Ngư' và 'Dư' phát âm giống nhau, tượng trưng cho 'Năm nào cũng dư dả' đúng không? Lần tới mở quán, tôi sẽ làm cho ông ăn thử xem sao!", replyZh: "沒錯！就是「年年有餘」！這張照片看起來你做得非常成功。今晚就好好享受你的年夜飯吧！新年快樂！🎊", isCorrect: true }
                        ]
                    }
                ]
            }
        };

        /* ==================================================================
           ENGINE LOGIC & TTS
           ================================================================== */
        let currentStage = 1;
        let currentTaskIndex = 0;
        let score = 0;
        let isMuted = false;
        let firstTry = true;
        const synth = window.speechSynthesis;

        function showStageSelect() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('memo-modal').style.display = 'none';
            document.getElementById('stage-select-screen').classList.remove('hidden');
        }

        function backToMenu() {
            synth.cancel();
            showStageSelect();
        }

        function startGame(stageNum) {
            currentStage = stageNum;
            currentTaskIndex = 0;
            score = 0;
            document.getElementById('chat-history').innerHTML = ''; 
            document.getElementById('stage-select-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            loadTask();
        }

        function updateUI() {
            document.getElementById('progress-text').innerText = `Stage: ${currentStage} - Task: ${currentTaskIndex + 1}/${GAME_DATA[currentStage].tasks.length}`;
            document.getElementById('score-text').innerText = `Trust Level: ${score}`;
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "🔇 Audio: OFF" : "🔊 Audio: ON";
            if(isMuted) synth.cancel();
        }

        // --- HỆ THỐNG ĐỌC TTS THÔNG MINH ---
        function speakChinese(textToRead) {
            if (isMuted) return;
            // Dọn dẹp thẻ HTML (<img>, <br>...) và Emoji trước khi đọc
            let cleanText = textToRead.replace(/<[^>]*>?/gm, ''); 
            cleanText = cleanText.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            
            const utterance = new SpeechSynthesisUtterance(cleanText.trim());
            utterance.lang = 'zh-TW'; 
            synth.speak(utterance);
        }

        function addMessage(speakerName, textZh, textVi, isPlayer) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isPlayer ? 'player-msg' : 'boss-msg'}`;
            
            let htmlContent = "";
            if(speakerName) { htmlContent += `<span class="speaker-name">${speakerName}</span>`; }
            htmlContent += textZh;
            if(textVi) { htmlContent += `<span class="note">(${textVi})</span>`; }
            
            msgDiv.innerHTML = htmlContent;
            document.getElementById('chat-history').appendChild(msgDiv);
            
            const chatHistory = document.getElementById('chat-history');
            chatHistory.scrollTop = chatHistory.scrollHeight;

            speakChinese(textZh); 
        }

        function loadTask() {
            const stageData = GAME_DATA[currentStage];
            if (currentTaskIndex >= stageData.tasks.length) {
                document.getElementById('memo-modal').style.display = 'flex';
                return;
            }

            const task = stageData.tasks[currentTaskIndex];
            firstTry = true;
            updateUI();
            
            document.getElementById('scene-title').innerText = task.taskName;
            document.getElementById('interactive-area').innerHTML = task.interactHtml;
            
            // Xử lý tin nhắn "Mở bài" của nhân viên nếu có (Dùng cho Màn 3)
            if (task.preMessage) {
                addMessage(task.preMessage.speakerIcon, task.preMessage.textZh, task.preMessage.textVi, true);
            }

            // Đợi một chút rồi in tin nhắn của Boss (giúp UI đỡ bị giật khi load 2 tin nhắn cùng lúc)
            setTimeout(() => {
                addMessage(task.speakerIcon, task.textZh, task.textVi, false);
                renderChoices(task);
            }, task.preMessage ? 800 : 0); 
        }

        function renderChoices(task) {
            const container = document.getElementById('choices-container');
            container.innerHTML = ''; 
            container.style.display = 'flex'; 

            task.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `💬 ${choice.textZh} <br><span class="note">(${choice.textVi})</span>`;
                btn.onclick = () => handleAnswer(choice, task);
                container.appendChild(btn);
            });
            
            setTimeout(() => {
                const chatHistory = document.getElementById('chat-history');
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 100);
        }

        function handleAnswer(choice, task) {
            document.getElementById('choices-container').style.display = 'none'; 
            
            // In câu trả lời của người chơi
            addMessage("", choice.textZh, "", true);

            // Đợi 1 giây để boss phản hồi
            setTimeout(() => {
                if(choice.isCorrect) {
                    score += firstTry ? 10 : 5;
                    addMessage(task.speakerIcon, choice.replyZh, "", false);
                    
                    // Kiểm tra xem có tin nhắn Auto-Reply của người chơi không (Như Task 3 - Màn 3)
                    if (choice.playerAutoReplyZh) {
                        setTimeout(() => {
                            addMessage("", choice.playerAutoReplyZh, "", true);
                            currentTaskIndex++;
                            setTimeout(loadTask, 2500); // Chuyển task sau khi tự động đáp
                        }, 1500); 
                    } else {
                        currentTaskIndex++;
                        setTimeout(loadTask, 2500); 
                    }
                } else {
                    score -= 2;
                    firstTry = false;
                    addMessage(task.speakerIcon, choice.replyZh, "", false);
                    updateUI();
                    setTimeout(() => renderChoices(task), 2000); 
                }
            }, 1000);
        }
    </script>
</body>
