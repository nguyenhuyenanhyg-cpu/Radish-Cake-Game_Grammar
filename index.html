<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘿蔔糕 - LINE 工作模擬</title>
    <style>
        /* CSS: Thiết kế giao diện chia đôi màn hình */
        body { 
            display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4;
        }
        
        /* Giao diện LINE bên trái */
        #chat-container { 
            width: 40%; background: #749cbd; padding: 20px; display: flex; flex-direction: column; border-right: 2px solid #ccc;
        }
        #chat-history {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;
        }
        .message { 
            padding: 12px 16px; border-radius: 15px; max-width: 80%; font-size: 16px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .boss-msg { 
            align-self: flex-start; background: #ffffff; border-top-left-radius: 0;
        }
        .player-msg { 
            align-self: flex-end; background: #85e04b; border-top-right-radius: 0;
        }
        .choices { 
            display: flex; flex-direction: column; gap: 10px;
        }
        .choice-btn { 
            padding: 12px; cursor: pointer; border: none; border-radius: 8px; background: white; font-size: 16px; text-align: left; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .choice-btn:hover { background: #e8f4f8; transform: translateY(-2px); }

        /* Giao diện Bếp/Tương tác bên phải */
        #game-container { 
            width: 60%; background: #fffcf5; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        #scene-title {
            color: #333; margin-bottom: 30px; font-size: 24px; border-bottom: 3px solid #ff9800; padding-bottom: 10px;
        }
        #interactive-area { 
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; width: 100%;
        }
        .item { 
            font-size: 60px; cursor: pointer; display: flex; flex-direction: column; align-items: center; padding: 20px; border: 3px dashed transparent; border-radius: 15px; transition: 0.3s;
        }
        .item span { font-size: 18px; margin-top: 10px; color: #555; font-weight: bold; }
        .item:hover { border-color: #ff9800; background: #fff3e0; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-history">
            </div>
        <div class="choices" id="choices-container">
            </div>
    </div>

    <div id="game-container">
        <h2 id="scene-title">場景載入中...</h2>
        <div id="interactive-area">
            </div>
    </div>

    <script>
        // JavaScript: Logic điều khiển luồng kịch bản (SBL)
        const chatHistory = document.getElementById('chat-history');
        const choicesContainer = document.getElementById('choices-container');
        const sceneTitle = document.getElementById('scene-title');
        const interactiveArea = document.getElementById('interactive-area');

        // Hàm thêm tin nhắn vào khung chat
        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'boss' ? 'boss-msg' : 'player-msg'}`;
            msgDiv.innerHTML = sender === 'boss' ? `👨‍🍳 <b>老闆：</b><br>${text}` : text;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight; // Tự động cuộn xuống
        }

        // Hàm xóa các nút lựa chọn cũ
        function clearChoices() {
            choicesContainer.innerHTML = '';
        }

        // -----------------------------------------------------
        // KỊCH BẢN MÀN 1: TÌM NGUYÊN LIỆU (Ngữ pháp: V + 到)
        // -----------------------------------------------------
        function startScene1() {
            sceneTitle.innerText = "第一關：冰箱找食材 (Tìm nguyên liệu)";
            interactiveArea.innerHTML = `<div class="item">🥬<span>高麗菜</span></div><div class="item">🦐<span>蝦米</span></div><div class="item">🍄<span>香菇</span></div>`;
            
            addMessage("早安！快開店了。去旁邊的冰箱看看，你昨天有沒有<b>買到</b>蝦米？", "boss");
            
            showScene1Choices();
        }

        function showScene1Choices() {
            clearChoices();
            const choices = [
                { text: "A. 老闆，我找蝦米了。", action: () => handleScene1Answer("A", "買了？那到底是有沒有買到啊？冰箱裡到底有沒有？ (Sai rồi, thiếu kết quả 到)") },
                { text: "B. 老闆，我沒看到蝦米。", action: () => handleScene1Answer("B", "就在冰箱第二層！你眼睛睜大一點！ (Sai thực tế, nhìn sang bên phải kìa!)") },
                { text: "C. 老闆，我買到蝦米了！", action: () => {
                    addMessage("老闆，我買到蝦米了！", "player");
                    addMessage("很好，拿出來準備做蘿蔔糕。👍", "boss");
                    setTimeout(startScene2, 2000); // Đợi 2 giây rồi sang Màn 2
                }}
            ];

            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = choice.action;
                choicesContainer.appendChild(btn);
            });
        }

        function handleScene1Answer(choice, bossReply) {
            addMessage(`老闆，我${choice === 'A' ? '找' : '沒看到'}蝦米了。`, "player");
            setTimeout(() => {
                addMessage(bossReply, "boss");
                showScene1Choices(); // Cho chọn lại
            }, 500);
        }

        // -----------------------------------------------------
        // KỊCH BẢN MÀN 2: CHỌN BỘT (Ngữ pháp: 是...的)
        // -----------------------------------------------------
        function startScene2() {
            clearChoices();
            sceneTitle.innerText = "第二關：調配粉漿 (Pha bột)";
            
            // Đưa các đồ vật lên màn hình tương tác
            interactiveArea.innerHTML = `
                <div class="item" onclick="wrongFlour()">🌾<span>麵粉</span></div>
                <div class="item" onclick="wrongFlour()">🥔<span>地瓜粉</span></div>
                <div class="item" onclick="correctFlour()">🍚<span>在來米粉</span></div>
            `;
            
            addMessage("聽好，我們客家蘿蔔糕跟外面不一樣。我們的蘿蔔糕<b>是</b>用純「在來米粉」做<b>的</b>，絕對不能加麵粉！把對的粉倒進鍋子裡。", "boss");
            
            const hint = document.createElement('div');
            hint.innerHTML = "<i>(Hãy click vào túi bột đúng ở màn hình bên phải)</i>";
            hint.style.color = "#666";
            choicesContainer.appendChild(hint);
        }

        function wrongFlour() {
            addMessage("哎呀！你加那個做什麼？你想做蛋糕嗎？重來！😡", "boss");
            // Đây chính là Bằng chứng phủ định tự nhiên (Negative Evidence)
        }

        function correctFlour() {
            addMessage("沒錯！就是這樣，準備下鍋。💯", "boss");
            interactiveArea.innerHTML = `<div class="item">🍲<span>完美的粉漿</span></div>`;
            clearChoices();
            const nextBtn = document.createElement('button');
            nextBtn.className = 'choice-btn';
            nextBtn.innerText = "🎉 進入下一關 (Hoàn thành bản Demo)";
            choicesContainer.appendChild(nextBtn);
        }

        // Bắt đầu game khi tải trang
        startScene1();
    </script>
</body>
</html>
